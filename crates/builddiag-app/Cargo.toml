[package]
name = "builddiag-app"
version.workspace = true
edition.workspace = true
license.workspace = true
repository.workspace = true
homepage.workspace = true
publish = false
description = "Internal orchestration for builddiag (not intended for direct use)"
keywords = ["rust", "build", "validation"]
categories = ["development-tools"]

[features]
default = ["cache"]
cache = ["builddiag-repo/cache"]

[dependencies]
anyhow.workspace = true
serde_json.workspace = true
chrono.workspace = true
camino.workspace = true
builddiag-types = { path = "../builddiag-types" }
builddiag-domain = { path = "../builddiag-domain" }
builddiag-repo = { path = "../builddiag-repo" }
builddiag-checks = { path = "../builddiag-checks" }
builddiag-render = { path = "../builddiag-render" }
toml.workspace = true

[dev-dependencies]
tempfile.workspace = true
