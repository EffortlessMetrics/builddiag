[package]
name = "builddiag"
version.workspace = true
edition.workspace = true
license.workspace = true
repository.workspace = true
homepage.workspace = true
description = "CLI tool to validate the build contract of Rust repositories"
readme = "README.md"
keywords = ["rust", "cli", "build", "validation", "msrv"]
categories = ["development-tools", "command-line-utilities"]

[dependencies]
anyhow.workspace = true
clap.workspace = true
camino.workspace = true
builddiag-app = { path = "../builddiag-app" }
builddiag-checks = { path = "../builddiag-checks" }
builddiag-domain = { path = "../builddiag-domain" }
builddiag-render = { path = "../builddiag-render" }
builddiag-types = { path = "../builddiag-types" }
serde.workspace = true
serde_json.workspace = true

[dev-dependencies]
assert_cmd.workspace = true
tempfile.workspace = true
predicates.workspace = true
cucumber.workspace = true
tokio.workspace = true

[[test]]
name = "cucumber"
harness = false
