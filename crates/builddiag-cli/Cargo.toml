[package]
name = "builddiag"
version = "0.1.0"
edition.workspace = true
license.workspace = true
description = "CLI tool to validate the build contract of Rust repositories"
repository = "https://github.com/user/builddiag"
homepage = "https://github.com/user/builddiag"
readme = "README.md"
keywords = ["rust", "cli", "build", "validation", "msrv"]
categories = ["development-tools", "command-line-utilities"]

[dependencies]
anyhow.workspace = true
clap.workspace = true
camino.workspace = true
builddiag-app = { path = "../builddiag-app" }
builddiag-render = { path = "../builddiag-render" }
builddiag-types = { path = "../builddiag-types" }
serde_json.workspace = true

[dev-dependencies]
assert_cmd.workspace = true
tempfile.workspace = true
predicates.workspace = true
