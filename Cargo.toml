[workspace]
resolver = "2"
members = [
  "crates/builddiag-types",
  "crates/builddiag-domain",
  "crates/builddiag-repo",
  "crates/builddiag-checks",
  "crates/builddiag-render",
  "crates/builddiag-app",
  "crates/builddiag-cli",
  "crates/depguard",
  "xtask",
]

[workspace.package]
edition = "2024"
license = "MIT OR Apache-2.0"

[workspace.dependencies]
anyhow = "1.0.79"
thiserror = "2.0.11"
serde = { version = "1.0.196", features = ["derive"] }
serde_json = "1.0.113"
schemars = { version = "0.8.16", features = ["chrono"] }
clap = { version = "4.5.1", features = ["derive"] }
toml = "0.8.10"
globset = "0.4.14"
cargo_metadata = "0.18.1"
semver = "1.0.22"
sha2 = "0.10.8"
hex = "0.4.3"
chrono = { version = "0.4.34", default-features = false, features = [
  "clock",
  "serde",
] }
camino = "1.1.6"
assert_cmd = "2.0.14"
predicates = "3.1.0"
tempfile = "3.10.1"
insta = { version = "1.34.0", features = ["json"] }
proptest = "1.4.0"
