[package]
name = "builddiag-fuzz"
version = "0.0.0"
authors = ["Automatically generated"]
publish = false
edition = "2021"

# Prevent cargo from including this in the parent workspace
[workspace]

[package.metadata]
cargo-fuzz = true

[dependencies]
libfuzzer-sys = "0.4"
arbitrary = { version = "1", features = ["derive"] }

# Crates to fuzz
builddiag-domain = { path = "../crates/builddiag-domain" }
builddiag-render = { path = "../crates/builddiag-render" }
builddiag-repo = { path = "../crates/builddiag-repo" }
builddiag-types = { path = "../crates/builddiag-types" }

# Dependencies needed for parsing
toml = "0.8"
serde_json = "1"
chrono = { version = "0.4", default-features = false, features = ["std"] }

[[bin]]
name = "fuzz_version"
path = "fuzz_targets/fuzz_version.rs"
test = false
doc = false
bench = false

[[bin]]
name = "fuzz_toml"
path = "fuzz_targets/fuzz_toml.rs"
test = false
doc = false
bench = false

[[bin]]
name = "fuzz_checksums"
path = "fuzz_targets/fuzz_checksums.rs"
test = false
doc = false
bench = false

[[bin]]
name = "fuzz_config"
path = "fuzz_targets/fuzz_config.rs"
test = false
doc = false
bench = false

[[bin]]
name = "fuzz_report"
path = "fuzz_targets/fuzz_report.rs"
test = false
doc = false
bench = false

[[bin]]
name = "fuzz_render"
path = "fuzz_targets/fuzz_render.rs"
test = false
doc = false
bench = false
